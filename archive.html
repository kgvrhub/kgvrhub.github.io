<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KGVR MEDIA | Archive</title>
  <style>
    /* ─── SYNCHRONIZED ARCHITECTURE CODES (Matches Index Exactly) ─── */
    :root {
      --color-bg: #ffffff;
      --color-surface: #fbfbfd;
      --color-text-primary: #1d1d1f;
      --color-text-secondary: #86868b;
      --color-border: rgba(0, 0, 0, 0.08);
      --glass-nav: rgba(255, 255, 255, 0.9);
      --transition-fast: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--color-bg); }
    body { background: var(--color-bg); color: var(--color-text-primary); font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; }
    body.modal-open { overflow: hidden; }

    nav#navbar {
      position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--glass-nav); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--color-border); padding: 15px 20px; transition: transform var(--transition-fast);
    }
    nav.nav-hidden { transform: translateY(-100%); }
    .nav-inner { display: flex !important; flex-direction: row !important; justify-content: space-between !important; align-items: center !important; flex-wrap: nowrap !important; width: 100%; max-width: 1400px; margin: 0 auto; }
    
    .logo-wrap { display: flex; align-items: center; flex-shrink: 0; width: auto !important; text-decoration: none; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; margin: 0; padding: 0; align-items: center; }
    .nav-links a { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-text-secondary); text-decoration: none; font-weight: 600; }
    
    .menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; z-index: 10001; flex-shrink: 0; }
    .menu-toggle span { display: block; width: 24px; height: 2px; background: var(--color-text-primary); transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .menu-toggle.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-toggle.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .menu-toggle.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--color-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2.5rem; z-index: 1500; opacity: 0; visibility: hidden; transition: all 0.4s ease; }
    .mobile-menu.open { opacity: 1; visibility: visible; }
    .mobile-menu a { font-size: 2rem; font-weight: 700; text-decoration: none; color: var(--color-text-primary); }

    /* ─── THREE COLUMN ARCHIVE SPECIFIC MATRIX ─── */
    .archive-container { max-width: 1400px; margin: 0 auto; padding: 8rem 2rem 4rem 2rem; }
    .archive-header { margin-bottom: 4rem; }
    .archive-header h2 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
    .archive-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
    
    .archive-item { display: flex; flex-direction: column; cursor: zoom-in; }
    .archive-img-wrap { aspect-ratio: 4/5; overflow: hidden; border-radius: 8px; background: var(--color-surface); border: 1px solid var(--color-border); }
    .archive-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform var(--transition-smooth); }
    .archive-item:hover img { transform: scale(1.04); }

    .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--transition-fast); }
    .lightbox.active { opacity: 1; pointer-events: all; }
    .lightbox-content { max-width: 90vw; max-height: 85vh; }
    .lightbox-content img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 6px; }

    @media (max-width: 992px) { .archive-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) { .nav-links { display: none !important; } .menu-toggle { display: flex !important; } .archive-grid { grid-template-columns: 1fr; gap: 1.5rem; } .archive-container { padding: 6rem 1.5rem; } }
  </style>
</head>
<body>

  <nav id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo-wrap">
        <img src="kgvr-logo.png" alt="KGVR MEDIA" style="height: 32px; width: auto; display: block;">
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#links">Communicate</a></li>
      </ul>
      <div class="menu-toggle" id="toggle">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <div class="mobile-menu" id="menu">
    <a href="index.html">Home</a>
    <a href="archive.html">Archive</a>
    <a href="index.html#links">Contact</a>
  </div>

  <div id="lightbox" class="lightbox">
    <div class="lightbox-content">
      <img id="lb-img" src="" alt="Enlarged View">
    </div>
  </div>

  <main class="archive-container">
    <header class="archive-header">
      <h2>Index Archive</h2>
    </header>
    
    <section class="archive-grid">
      <article class="archive-item gallery-item">
        <div class="archive-img-wrap">
          <img src="Preci_20260520_155923_0000.png" data-full="Preci_20260520_155923_0000.png" alt="Asset Archive 1">
        </div>
      </article>
      <article class="archive-item gallery-item">
        <div class="archive-img-wrap">
          <img src="REDEMPTION_20260517_001455_0000.png" data-full="REDEMPTION_20260517_001455_0000.png" alt="Asset Archive 2">
        </div>
      </article>
      </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('toggle');
      const menu = document.getElementById('menu');

      toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        toggle.classList.toggle('active');
        menu.classList.toggle('open');
        document.body.classList.toggle('modal-open');
      });

      document.querySelectorAll('.mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
          toggle.classList.remove('active');
          menu.classList.remove('open');
          document.body.classList.remove('modal-open');
        });
      });

      let lastScroll = 0;
      const navbar = document.getElementById('navbar');
      window.addEventListener('scroll', () => {
        const currentScroll = window.pageYOffset;
        if (currentScroll <= 0) {
          navbar.classList.remove('nav-hidden');
          return;
        }
        if (currentScroll > lastScroll && !navbar.classList.contains('nav-hidden') && !menu.classList.contains('open')) {
          navbar.classList.add('nav-hidden');
        } else if (currentScroll < lastScroll && navbar.classList.contains('nav-hidden')) {
          navbar.classList.remove('nav-hidden');
        }
        lastScroll = currentScroll;
      });

      const lightbox = document.getElementById('lightbox');
      const lbImg = document.getElementById('lb-img');

      document.querySelectorAll('.gallery-item img').forEach(img => {
        img.addEventListener('click', () => {
          lbImg.src = img.getAttribute('data-full');
          lightbox.classList.add('active');
          document.body.classList.add('modal-open');
        });
      });

      lightbox.addEventListener('click', (e) => {
        if (e.target !== lbImg) {
          lightbox.classList.remove('active');
          document.body.classList.remove('modal-open');
          setTimeout(() => { lbImg.src = ''; }, 250);
        }
      });
    });
  </script>
</body>
</html>
