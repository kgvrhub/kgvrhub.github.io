<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>KGVR MEDIA | Archive Vault</title>
  <style>
    /* ─── DESIGN CORE & TOKENS ─── */
    :root {
      --color-bg: #080808;
      --color-surface: #111111;
      --color-text-primary: #fbfbfd;
      --color-text-secondary: #9b9b9b;
      --color-border: rgba(255, 255, 255, 0.08);
      --glass-nav: rgba(0, 0, 0, .75);
      --transition-fast: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      background: var(--color-bg);
    }

    body {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    background: linear-gradient(
  180deg,
  #151515 0%,
  #080808 40%,
  #000000 100%
);

    body.modal-open {
      overflow: hidden;
    }

    /* ─── NAVIGATION SCROLL ENGINE ─── */
    nav#navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: var(--glass-nav);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border);
      padding: 15px 20px;
      transition: transform var(--transition-fast);
      will-change: transform;
    }

    nav.nav-hidden {
      transform: translateY(-100%);
    }

    .nav-inner {
      display: flex !important;
      flex-direction: row !important;
      justify-content: space-between !important;
      align-items: center !important;
      flex-wrap: nowrap !important;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ─── LOGO & DESKTOP LINKS ─── */
    .logo-wrap {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      width: auto !important;
      text-decoration: none;
      transition: opacity var(--transition-fast);
    }

    .logo-wrap:hover {
      opacity: 0.7;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
      align-items: center;
    }

    .nav-links a {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-secondary);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition-fast);
    }

    .nav-links a:hover {
      color: var(--color-text-primary);
    }

    /* ─── HAMBURGER MENU ENGINE ─── */
    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      z-index: 10001;
      flex-shrink: 0;
    }

    .menu-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--color-text-primary);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .menu-toggle.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-toggle.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .menu-toggle.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ─── FULLSCREEN MOBILE OVERLAY ─── */
    .mobile-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2.5rem;
      z-index: 1500;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .mobile-menu.open {
      opacity: 1;
      visibility: visible;
    }

    .mobile-menu a {
      font-size: 2rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--color-text-primary);
    }

    /* ─── MULTI-COLUMN ARCHIVE SYSTEM ─── */
    .archive-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 8rem 2rem 4rem 2rem;
    }

    .archive-header {
      margin-bottom: 4rem;
    }

    .archive-header h2 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .archive-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }
    
    .archive-item {
      display: flex;
      flex-direction: column;
    }

    .archive-img-wrap {
      position: relative;
      aspect-ratio: 4/5;
      overflow: hidden;
      border-radius: 8px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      cursor: zoom-in;
    }

    .archive-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform var(--transition-smooth);
      will-change: transform;
    }

    .archive-item:hover img {
      transform: scale(2.04);
    }

    /* ─── CONTACT MATRIX ─── */
    .contact-matrix {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem 3rem;
      max-width: 400px;
      margin: 0 auto 4rem auto;
      padding: 0 20px;
    }

    .contact-matrix a {
      color: #f8f6f0;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #000;
      padding-bottom: 4px;
    }

    /* ─── LIGHTBOX ARCHITECTURE ─── */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-fast);
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-content {
      max-width: 90vw;
      max-height: 85vh;
    }

    .lightbox-content img {
      max-width: 100%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.1);
    }

    /* ─── RESPONSIVE SYSTEM (MOBILE FIXES) ─── */
    @media (max-width: 992px) {
      .archive-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .nav-links { display: none !important; }
      .menu-toggle { display: flex !important; }
      .archive-grid { grid-template-columns: 1fr; gap: 1.5rem; }
      .archive-container { padding: 6rem 1.5rem; }
      
      /* THIS FORCES THE FOOTER LINKS TO STACK ON PHONES */
      .contact-matrix { 
        grid-template-columns: 1fr; 
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('toggle');
      const menu = document.getElementById('menu');

      toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        toggle.classList.toggle('active');
        menu.classList.toggle('open');
        document.body.classList.toggle('modal-open');
      });

      document.querySelectorAll('.mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
          toggle.classList.remove('active');
          menu.classList.remove('open');
          document.body.classList.remove('modal-open');
        });
      });

      let lastScroll = 0;
      let ticking = false;
      const navbar = document.getElementById('navbar');
      
      window.addEventListener('scroll', () => {
        lastScroll = window.pageYOffset;
        if (!ticking) {
          window.requestAnimationFrame(() => {
            if (lastScroll <= 0) {
              navbar.classList.remove('nav-hidden');
            } else if (lastScroll > window.scrollY || lastScroll > 50) { 
               if (lastScroll > 50 && !menu.classList.contains('open')) {
                 navbar.classList.add('nav-hidden');
               }
            } else {
               navbar.classList.remove('nav-hidden');
            }
            ticking = false;
          });
          ticking = true;
        }
      });

      let previousScrollY = window.scrollY;
      window.addEventListener('scroll', () => {
        const currentScrollY = window.scrollY;
        if (currentScrollY < previousScrollY && navbar.classList.contains('nav-hidden')) {
           navbar.classList.remove('nav-hidden');
        }
        previousScrollY = currentScrollY;
      });

      const lightbox = document.getElementById('lightbox');
      const lbImg = document.getElementById('lb-img');

      document.querySelectorAll('.gallery-item img').forEach(img => {
        img.addEventListener('click', () => {
          lbImg.src = img.getAttribute('data-full');
          lightbox.classList.add('active');
          lightbox.setAttribute('aria-hidden', 'false');
          document.body.classList.add('modal-open');
        });
      });

      lightbox.addEventListener('click', (e) => {
        if (e.target !== lbImg) {
          lightbox.classList.remove('active');
          lightbox.setAttribute('aria-hidden', 'true');
          document.body.classList.remove('modal-open');
          setTimeout(() => { lbImg.src = ''; }, 250);
        }
      });
    });
  </script>
